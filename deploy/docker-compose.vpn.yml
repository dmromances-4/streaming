# Overlay VPN: docker compose -f docker-compose.yml -f docker-compose.vpn.yml up
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: skill-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY:-}
      - WIREGUARD_ENDPOINT_IP=${WIREGUARD_ENDPOINT_IP:-}
      - WIREGUARD_ENDPOINT_PORT=${WIREGUARD_ENDPOINT_PORT:-51820}
      - FIREWALL_VPN_INPUT_PORTS=8003
      - HTTPPROXY=off
      - DOT=off
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  live-sports:
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - VPN_REQUIRED=true
      - VPN_HEALTH_URL=http://127.0.0.1:9999/v1/status
      - BBC_IPLAYER_COOKIES=${BBC_IPLAYER_COOKIES:-}
      - FRANCE_TV_COOKIES=${FRANCE_TV_COOKIES:-}

  nginx:
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - ./nginx/default.vpn.conf:/etc/nginx/conf.d/default.conf:ro
