upstream ingestion_torrent {
    server ingestion-torrent:8001;
}

upstream storage_hls {
    server storage-hls:8002;
}

upstream live_sports {
    server gluetun:8003;
}

upstream catalog_metadata {
    server catalog-metadata:8004;
}

upstream frontend_view {
    server frontend-view:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location /api/ingest/ {
        proxy_pass http://ingestion_torrent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/hls/ {
        proxy_pass http://storage_hls/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header Access-Control-Allow-Origin * always;
    }

    location /api/live/ {
        proxy_pass http://live_sports/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Access-Control-Allow-Origin * always;
    }

    location /api/catalog/ {
        proxy_pass http://catalog_metadata/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        add_header Access-Control-Allow-Origin * always;
    }

    location = /health {
        proxy_pass http://ingestion_torrent/health;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://frontend_view/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
