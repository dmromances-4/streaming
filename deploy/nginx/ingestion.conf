upstream ingestion_torrent {
    server ingestion-torrent:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    # Skill #1 — Ingestion Torrent
    location /api/ingest/ {
        proxy_pass http://ingestion_torrent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming: no bufferizar respuestas largas
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health via nginx root (opcional)
    location /health {
        proxy_pass http://ingestion_torrent/health;
        proxy_http_version 1.1;
    }

    location / {
        return 200 '{"status":"streaming-platform","phase":1,"skills":["ingestion-torrent"]}';
        add_header Content-Type application/json;
    }
}
